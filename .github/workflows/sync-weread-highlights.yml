name: Sync WeRead Highlights

on:
  workflow_dispatch:
  schedule:
    - cron: "10 21 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync highlights
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        run: node scripts/sync-weread-highlights.mjs

      - name: Commit highlights
        run: |
          if git diff --quiet -- highlights.json; then
            echo "No highlight changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add highlights.json
          git commit -m "Sync WeRead highlights"
          git push
